<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Neues Passwort festlegen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="auth-card">
    <h2>Neues Passwort festlegen</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-messages" style="margin-bottom: 15px;">
          {% for message in messages %}
            <p style="color: #d9534f; background-color: #f2dede; border: 1px solid #ebccd1; padding: 10px; border-radius: 4px;">
                {{ message }}
            </p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="password" name="password" placeholder="Neues Passwort" required minlength="4">
        
        <div style="font-size: 0.8em; text-align: left; margin: 10px 0; color: #666;"> 
         <strong>Anforderungen:</strong>
         <ul >
            <li>min. 8 Zeichen; min. 1 Großbuchstabe; min. 1 Zahl; min. 1 Sonderzeiche</li>
         </ul>
        </div >

        <button type="submit" class="btn-submit">Passwort dauerhaft speichern</button>
    </form>

    <div class="footer-links" style="margin-top: 15px;">
        <a href="/login">Abbrechen und zum Login</a>
    </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>2-Faktor-Authentifizierung</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="auth-card">
    <h2>Zwei-Faktor-Authentifizierung</h2>
    
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div style="color: white; background-color: #d9534f; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
          {% for message in messages %}
            {{ message }}
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <p>Geben Sie den Code aus der Konsole ein.</p>
    <form method="POST">
        <input name="code" placeholder="6-stelliger Code" required autocomplete="off">
        <button type="submit" class="btn-submit">Prüfen</button>
    </form>
</div>
</body>
</html>

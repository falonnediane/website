<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Login Logs</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div id="session-timer-box" style="
        position: fixed;
        top: 20px;
        right: 20px;
        background: rgba(255, 255, 255, 0.9);
        padding: 10px 15px;
        border-radius: 8px;
        border: 1px solid #d9534f;
        box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        z-index: 1000;
        font-family: sans-serif;">
        <span style="font-size: 0.8em; color: #666; display: block;">Sitzung läuft ab in:</span>
        <span id="timer" style="color: #d9534f; font-weight: bold; font-size: 1.2em;">--:--</span>
     </div>

 <div class="container">
    <h2>Login Logs <a href="/logout" style="font-size: 14px; color: red; text-decoration: none; margin-left: 20px;">Logout</a></h2>
    
   <table border="1" style="width: 100%; text-align: left; border-collapse: collapse; margin-top: 20px;">
    <thead>
        <tr style="background-color: #f2f2f2;">
            <th style="padding: 10px;">User (E-Mail)</th>
            <th style="padding: 10px;">Zeitpunkt</th>
            <th style="padding: 10px;">Ergebnis</th>
        </tr>
    </thead>
    <tbody>
     
        {% for log in logs %}
        <tr>
            <td style="padding: 10px;">{{ log['email'] }}</td>
            <td style="padding: 10px;">{{ log['time'] }}</td>
            <td style="padding: 10px;">
                {% if log['success'] == 1 %}
                    <span style="color: green; font-weight: bold;">✔ Erfolg</span>
                {% else %}
                    <span style="color: red; font-weight: bold;">✘ Fehlgeschlagen</span>
                {% endif %}
            </td>
        </tr>
        {% endfor %}

     
    </tbody>
  </table>
 </div>

  <script>
      // Wir nehmen den Timeout-Wert von Flask (in Sekunden)
      let secondsLeft = parseInt("{{ timeout }}");
      const timerDisplay = document.getElementById('timer');

      function updateTimer() {
        let minutes = Math.floor(secondsLeft / 60);
        let seconds = secondsLeft % 60;
        
        // Anzeige formatieren (z.B. 09:05)
        timerDisplay.textContent = 
            (minutes < 10 ? "0" : "") + minutes + ":" + 
            (seconds < 10 ? "0" : "") + seconds;

        // Wenn die Zeit abgelaufen ist
        if (secondsLeft <= 0) {
            alert("Deine Sitzung ist abgelaufen. Du wirst zum Login weitergeleitet.");
            window.location.href = "/login";
        } else {
            secondsLeft--;
        }
        
        // Optische Warnung, wenn weniger als 1 Minute übrig ist
        if (secondsLeft < 60) {
            document.getElementById('session-timer-box').style.backgroundColor = "#f2dede";
        }
      }

       // Timer jede Sekunde starten
       setInterval(updateTimer, 1000);
       updateTimer();
    </script>
</body>
</html>

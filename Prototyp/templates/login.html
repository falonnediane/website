<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmelden - Authentifizierungssystem</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="auth-card">
        <h1>Willkommen zurück</h1>
        <p class="subtitle">Melde dich bei deinem Konto an</p>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="flash-messages">
              {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <div class="form-group"
                <label>E-Mail-Adresse</label>
                <input type="email" name="email" placeholder="email" required>
            </div>
            <div class="form-group">
                <label>Passwort</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-submit">Anmelden</button>
            <div style="margin-top: 10px; text-align: center;">
              <a href="/reset_password" style="font-size: 0.8em; color: #555; text-decoration: none;">
               Passwort vergessen?
              </a>
            </div>

        </form>

        <div class="footer-links">
            Noch kein Konto? <a href="/register">Registrieren</a>
        </div>
    </div>
</body>
</html>

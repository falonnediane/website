<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="auth-card">
    <h2>Registrieren</h2>

    {% with messages = get_flashed_messages() %}
  {% if messages %}
    {% for message in messages %}
      <p style="color: red; background: #fee; border: 1px solid red; padding: 10px;">
        {{ message }}
      </p>
    {% endfor %}
  {% endif %}
{% endwith %}

    <form method="POST">
        <div class="form-group"
                <label>E-Mail-Adresse</label>
                <input type="email" name="email" placeholder="email" required>
        </div>
        <div class="form-group">
                <label>Passwort</label>
                <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <div style="font-size: 0.8em; text-align: left; margin: 10px 0; color: #666;"> 
         <strong>Anforderungen:</strong>
         <ul >
            <li>min. 8 Zeichen; min. 1 Großbuchstabe; min. 1 Zahl; min. 1 Sonderzeiche</li>
         </ul>
        </div >
        <button type="submit" class="btn-submit">Account erstellen</button>
    </form>
    
    <a href="/login">Zurück zum Login</a>
</div>

</body>
</html>

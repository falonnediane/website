<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Passwort zurücksetzen</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<div class="auth-card">
    <h2>Passwort zurücksetzen</h2>

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash-messages" style="margin-bottom: 15px;">
          {% for message in messages %}
            <p style="color: #d9534f; background-color: #f2dede; border: 1px solid #ebccd1; padding: 10px; border-radius: 4px;">
                {{ message }}
            </p>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST">
        <input type="email" name="email" placeholder="E-Mail Adresse" required>
        <button type="submit" class="btn-submit">Link zum Zurücksetzen senden</button>
    </form>

    <div class="footer-links" style="margin-top: 15px;">
        <a href="/login">Zurück zum Login</a>
    </div>
</div>

</body>
</html>
